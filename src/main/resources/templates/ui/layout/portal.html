

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title}"> HappyToHelp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/portal.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="navbar navbar-dark bg-dark" style="height:56px;">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/}">HomeLoan Portal</a>
    <div class="d-flex align-items-center gap-2">
      <span class="text-white-50" th:if="${me != null}">
        <span th:text="${me.email}"></span> (<span th:text="${me.role}"></span>)
      </span>
      <form th:if="${me != null}" method="post" th:action="@{/ui/logout}">
        <button class="btn btn-warning btn-sm" type="submit">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="d-flex portal-wrap">
  <aside class="sidebar p-3">
    <div class="brand mb-3">MENU</div>

    <div th:if="${me != null and me.role.name() == 'CUSTOMER'}" class="d-grid gap-2">
      <a class="nav-link" th:href="@{/ui/customer/dashboard}">Dashboard</a>
      <a class="nav-link" th:href="@{/ui/customer/applications/new}">New Application</a>
    </div>

    <div th:if="${me != null and me.role.name() == 'ADMIN'}" class="d-grid gap-2">
      <a class="nav-link" th:href="@{/ui/admin/dashboard}">Dashboard</a>
      <a class="nav-link" th:href="@{/ui/admin/messages}">Messages</a>
    </div>

<!-- <div th:if="${me != null and me.role.name() == 'ADMIN'}" class="d-grid gap-2">
  <a class="nav-link" th:href="@{/ui/admin/dashboard}">Dashboard</a>
  <a class="nav-link" th:href="@{/ui/admin/messages}">Messages</a>
</div> -->

    <hr class="border-secondary"/>

    <div class="small text-white-50">
      <div><b>Name:</b> <span th:text="${me != null ? me.name : '-'}"></span></div>
      <div><b>Role:</b> <span th:text="${me != null ? me.role : '-'}"></span></div>
    </div>
  </aside>

  <main class="main">
    <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
    <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>
    <div th:replace="${content}"></div>
  </main>
</div>
</body>
</html>
