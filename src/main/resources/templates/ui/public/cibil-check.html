<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ui/public/public-layout :: layout('CIBIL Check', ~{::section})}">
<section>

  <div class="page-hero">
    <div class="badge bg-success-subtle text-success mb-2">
      <i class="bi bi-graph-up-arrow"></i> Tool
    </div>
    <div class="title h2 mb-1">CIBIL Check</div>
    <div class="muted">score check for project purpose. Extend later with real bureau API.</div>
  </div>

  <div class="row g-3 mt-3">
    <div class="col-lg-7">
      <div class="form-shell">
        <div class="h5 fw-bold mb-2">Enter details</div>

        <form method="post" th:action="@{/ui/public/cibil-check}" class="row g-3">
          <div class="col-md-7">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="fullName" th:value="${fullName}" required>
          </div>
          <div class="col-md-5">
            <label class="form-label">PAN</label>
            <input class="form-control" name="pan" th:value="${pan}" required>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-success" type="submit">
              <i class="bi bi-search"></i> Check Score
            </button>
            <a class="btn btn-outline-secondary" th:href="@{/ui/public/cibil-check}">Reset</a>
          </div>
        </form>

        <div class="soft-divider"></div>
        <div class="muted small">
          Score range : 650 to 850. Higher score generally improves eligibility.
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="score-card">
        <div class="h5 fw-bold mb-2">Your Score</div>

        <div th:if="${score == null}" class="muted">
          Submit the form to generate a score.
        </div>

        <div th:if="${score != null}">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <div class="muted small">Score</div>
              <div class="display-6 fw-bold" th:text="${score}">0</div>
            </div>
            <div>
              <span class="score-badge"
                    th:style="${score >= 750} ? 'background: rgba(34,197,94,.14); color:#15803d; border:1px solid rgba(34,197,94,.25)'
                              : (${score >= 700} ? 'background: rgba(255,193,7,.18); color:#8a6d00; border:1px solid rgba(255,193,7,.30)'
                              : 'background: rgba(220,53,69,.12); color:#b02a37; border:1px solid rgba(220,53,69,.22)')"
                    th:text="${score >= 750} ? 'Excellent' : (${score >= 700} ? 'Good' : 'Needs Improvement')">
              </span>
            </div>
          </div>

          <div class="mt-3">
            <div class="muted small mb-1">Score Meter</div>
            <div class="progress" style="height: 10px;">
              <div class="progress-bar"
                   role="progressbar"
                   th:style="'width:' + ${((score - 650) * 100) / 200} + '%'"
                   th:classappend="${score >= 750} ? ' bg-success' : (${score >= 700} ? ' bg-warning text-dark' : ' bg-danger')">
              </div>
            </div>
            <div class="d-flex justify-content-between small muted mt-1">
              <span>650</span><span>700</span><span>750</span><span>850</span>
            </div>
          </div>

          <div class="mt-3">
            <a class="btn btn-primary w-100" th:href="@{/ui/register}">
              <i class="bi bi-house-door"></i> Start Loan Application
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>

</section>
</html>
