<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ui/public/public-layout :: layout('EMI Calculator', ~{::section})}">
<section>

  <div class="page-hero">
    <div class="badge bg-primary-subtle text-primary mb-2">
      <i class="bi bi-calculator"></i> Tool
    </div>
    <div class="title h2 mb-1">EMI Calculator</div>
    <div class="muted">Estimate EMI, total interest, and total payable amount.</div>
  </div>

  <div class="row g-3 mt-3">
    <div class="col-lg-7">
      <div class="form-shell">
        <div class="h5 fw-bold mb-2">Enter details</div>

        <form method="post" th:action="@{/ui/public/emi-calculator}" class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Principal (₹)</label>
            <input type="number" step="0.01" class="form-control" name="principal" th:value="${principal}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Annual Rate (%)</label>
            <input type="number" step="0.01" class="form-control" name="annualRate" th:value="${annualRate}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Tenure (months)</label>
            <input type="number" class="form-control" name="tenureMonths" th:value="${tenureMonths}" required>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-lightning-charge"></i> Calculate
            </button>
            <a class="btn btn-outline-secondary" th:href="@{/ui/public/emi-calculator}">Reset</a>
          </div>
        </form>

        <div class="soft-divider"></div>

        <div class="muted small">
          Tip: Use the calculator before applying to decide tenure based on affordability.
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="score-card">
        <div class="h5 fw-bold mb-2">Result</div>

        <div th:if="${emi == null}" class="muted">
          Enter principal, interest rate and tenure to view EMI.
        </div>

        <div th:if="${emi != null}">
          <div class="info-tile p-3 mb-3" style="box-shadow:none; border:1px solid rgba(0,0,0,.06);">
            <div class="muted small">Monthly EMI</div>
            <div class="h3 fw-bold mb-0" th:text="${emi}"></div>
          </div>

          <div class="row g-2">
            <div class="col-6">
              <div class="info-tile p-3" style="box-shadow:none; border:1px solid rgba(0,0,0,.06);">
                <div class="muted small">Total Interest</div>
                <div class="fw-bold" th:text="${totalInterest}"></div>
              </div>
            </div>
            <div class="col-6">
              <div class="info-tile p-3" style="box-shadow:none; border:1px solid rgba(0,0,0,.06);">
                <div class="muted small">Total Payable</div>
                <div class="fw-bold" th:text="${totalPayable}"></div>
              </div>
            </div>
          </div>

          <div class="mt-3">
            <a class="btn btn-success w-100" th:href="@{/ui/register}">
              <i class="bi bi-person-plus"></i> Apply Now
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>

</section>
</html>
