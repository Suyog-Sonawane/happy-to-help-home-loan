<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ui/layout/portal :: layout('Payment Receipt', ~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div>
      <h3 class="mb-0">Payment Receipt</h3>
      <div class="text-muted">App #<b th:text="${app.id}"></b> | EMI #<b th:text="${emi.installmentNo}"></b></div>
    </div>
    <a class="btn btn-outline-secondary" th:href="@{'/ui/customer/applications/' + ${app.id} + '/emis'}">Back</a>
  </div>

  <div class="card p-3">
    <div class="row g-2">
      <div class="col-md-6"><b>Paid Date:</b> <span th:text="${emi.paidDate}"></span></div>
      <div class="col-md-6"><b>Method:</b> <span th:text="${emi.payment.method}"></span></div>

      <div class="col-md-4"><b>EMI Amount:</b> <span th:text="${emi.emiAmount}"></span></div>
      <div class="col-md-4"><b>Principal:</b> <span th:text="${emi.principalComponent}"></span></div>
      <div class="col-md-4"><b>Interest:</b> <span th:text="${emi.interestComponent}"></span></div>

      <div class="col-12"><b>Txn Ref:</b> <span th:text="${emi.payment.txnRef}"></span></div>
    </div>

    <div class="mt-3">
      <a class="btn btn-success"
         th:href="@{'/ui/customer/applications/' + ${app.id} + '/emis/' + ${emi.id} + '/receipt.pdf'}"
         target="_blank">Download Receipt PDF</a>
    </div>
  </div>
</section>
</html>
