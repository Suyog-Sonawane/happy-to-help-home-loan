<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ui/layout/portal :: layout('New Application', ~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div>
      <h3 class="mb-0">Create Loan Application</h3>
      <div class="text-muted">Enter loan and property details</div>
    </div>
    <a class="btn btn-outline-secondary" th:href="@{/ui/customer/dashboard}">Back</a>
  </div>

  <div class="card p-3">
    <form th:action="@{/ui/customer/applications}" method="post" th:object="${req}" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Requested Amount</label>
        <input type="number" step="0.01" class="form-control" th:field="*{requestedAmount}" required>
        <div class="text-danger" th:errors="*{requestedAmount}"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Tenure (months)</label>
        <input type="number" step="1" class="form-control" th:field="*{tenureMonths}" required>
        <div class="text-danger" th:errors="*{tenureMonths}"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Property Value</label>
        <input type="number" step="0.01" class="form-control" th:field="*{propertyValue}" required>
        <div class="text-danger" th:errors="*{propertyValue}"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Monthly Income</label>
        <input type="number" step="0.01" class="form-control" th:field="*{monthlyIncome}" required>
        <div class="text-danger" th:errors="*{monthlyIncome}"></div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Existing EMI</label>
        <input type="number" step="0.01" class="form-control" th:field="*{existingEmi}" required>
        <div class="text-danger" th:errors="*{existingEmi}"></div>
      </div>

      <div class="col-12">
        <label class="form-label">Property Address</label>
        <textarea class="form-control" th:field="*{propertyAddress}" rows="2" required></textarea>
        <div class="text-danger" th:errors="*{propertyAddress}"></div>
      </div>

      <div class="col-12">
        <button class="btn btn-success" type="submit">Create</button>
      </div>
    </form>
  </div>
</section>
</html>
