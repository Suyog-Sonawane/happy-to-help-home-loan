<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title}">HomeLoan</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>

<!-- Top navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/}">HomeLoan Portal</a>

    <div class="d-flex align-items-center gap-2">
      <span class="text-white-50" th:if="${me != null}">
        <span th:text="${me.email}"></span> (<span th:text="${me.role}"></span>)
      </span>

      <form th:if="${me != null}" method="post" th:action="@{/ui/logout}">
        <button class="btn btn-warning btn-sm" type="submit">Logout</button>
      </form>

      <a th:if="${me == null}" class="btn btn-outline-light btn-sm" th:href="@{/ui/login}">Login</a>
    </div>
  </div>
</nav>

<!-- Alerts -->
<div class="container mt-3">
  <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
  <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>
</div>

<!-- Page content -->
<div class="container my-4" th:insert="${content}">
  <!-- page content will render here -->
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
