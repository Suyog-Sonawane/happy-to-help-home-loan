<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title}">HomeLoan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/}">HappyToHelp HomeLoan</a>

    <div class="d-flex gap-2 align-items-center ms-auto">
      <a class="btn btn-outline-light btn-sm"
         th:if="${me != null and me.role.name() == 'CUSTOMER'}"
         th:href="@{/ui/customer/dashboard}">Customer</a>

      <a class="btn btn-outline-light btn-sm"
         th:if="${me != null and me.role.name() == 'ADMIN'}"
         th:href="@{/ui/admin/dashboard}">Admin</a>

      <span class="text-white-50" th:if="${me != null}">
        <span th:text="${me.email}"></span> (<span th:text="${me.role}"></span>)
      </span>

      <a class="btn btn-outline-light btn-sm" th:if="${me == null}" th:href="@{/ui/login}">Login</a>

      <form th:if="${me != null}" method="post" th:action="@{/ui/logout}">
        <button class="btn btn-warning btn-sm" type="submit">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div th:fragment="alerts" class="container mt-3">
  <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
  <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>
</div>

</body>
</html>
