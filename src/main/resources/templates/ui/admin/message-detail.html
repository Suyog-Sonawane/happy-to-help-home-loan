<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ui/layout/portal :: layout('Message Detail', ~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div>
      <div class="h3 fw-bold mb-0">Message #<span th:text="${m.id}"></span></div>
      <div class="text-muted">Status: <b th:text="${m.status}"></b></div>
    </div>
    <a class="btn btn-outline-secondary" th:href="@{/ui/admin/messages}">Back</a>
  </div>

  <div class="card p-3">
    <p class="mb-1"><b>Name:</b> <span th:text="${m.name}"></span></p>
    <p class="mb-1"><b>Email:</b> <span th:text="${m.email}"></span></p>
    <p class="mb-1"><b>Subject:</b> <span th:text="${m.subject}"></span></p>
    <p class="mb-3"><b>Created:</b> <span th:text="${m.createdAt}"></span></p>

    <div class="border rounded p-3 bg-light">
      <pre class="mb-0" style="white-space:pre-wrap;" th:text="${m.message}"></pre>
    </div>

    <form th:if="${m.status.name()=='NEW'}" method="post" th:action="@{'/ui/admin/messages/' + ${m.id} + '/resolve'}" class="mt-3">
      <button class="btn btn-success" type="submit"><i class="bi bi-check2-circle"></i> Mark Resolved</button>
    </form>
  </div>
</section>
</html>
