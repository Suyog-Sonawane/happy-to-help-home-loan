<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ui/layout/portal :: layout('Messages', ~{::section})}">
<section>
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div>
      <div class="h3 fw-bold mb-0"><i class="bi bi-inbox me-1"></i> Contact Messages</div>
      <div class="text-muted">Customer enquiries from public contact page</div>
    </div>
  </div>

  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle mb-0">
        <thead>
        <tr>
          <th>ID</th><th>Status</th><th>Name</th><th>Email</th><th>Subject</th><th>Created</th><th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="x : ${messages}">
          <td th:text="${x.id}"></td>
          <td>
            <span class="badge text-bg-warning" th:if="${x.status.name()=='NEW'}">NEW</span>
            <span class="badge text-bg-success" th:if="${x.status.name()=='RESOLVED'}">RESOLVED</span>
          </td>
          <td th:text="${x.name}"></td>
          <td th:text="${x.email}"></td>
          <td th:text="${x.subject}"></td>
          <td th:text="${x.createdAt}"></td>
          <td><a class="btn btn-sm btn-outline-primary" th:href="@{'/ui/admin/messages/' + ${x.id}}">Open</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(messages)}">
          <td colspan="7" class="text-center text-muted py-4">No messages.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
</html>
