spring.application.name=happy-to-help-home-loan
server.port=8086

# =========================
# Database (MySQL)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/homeloan_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# =========================
# Thymeleaf/UI
# =========================
spring.thymeleaf.cache=false

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# =========================
# Seed Admin
# =========================
app.admin.email=admin@bank.com
app.admin.password=Admin@123
app.admin.name=Bank Admin

# =========================
# Bank details for PDFs
# =========================
#app.bank.name=ABC Housing Finance
#app.bank.branch=Main Branch
#app.bank.contact=1800-000-000

app.bank.name=Happy-To-Help-Finance Housing Finance
app.bank.branch=Main Branch
app.bank.contact=1800-180-1800


# =========================
# Gmail SMTP (STARTTLS - Port 587)
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=thenanadon555@gmail.com
spring.mail.password=kyqgyatrtyvklwev

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Do NOT fail application startup if SMTP is blocked (college/hotspot)
spring.mail.test-connection=false

# Timeouts (increase for slow networks)
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000

# Debug (keep DEBUG only while testing)
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=INFO
logging.level.org.springframework.boot.autoconfigure.mail=INFO
logging.level.com.sun.mail=INFO

# =========================
# Support email for Contact Us notifications
# =========================
app.support.toEmail=thenanadon555@gmail.com